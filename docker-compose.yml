version: "3.9"

services:
  ubuntu-dev:
    build: .
    container_name: ubuntu-dev
    tty: true
    depends_on:
      - postgres
    networks:
      - app-network
    volumes:
      - ./app:/app
  postgres:
    image: postgres:18.4@sha256:3d0f7584ed7d04e27fa050d6683a74746608faf21f202be78460d679cc56461f
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network: